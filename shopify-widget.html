<style>
  #sommelier-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 62px;
    height: 62px;
    border-radius: 50%;
    background: linear-gradient(135deg, #8b0000, #6b0020);
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(139,0,0,0.5), 0 0 0 0 rgba(139,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    z-index: 9999;
    animation: somm-pulse 2.5s ease-in-out infinite;
    transition: transform 0.2s ease;
  }
  #sommelier-btn:hover { transform: scale(1.1); }

  #sommelier-label {
    position: fixed;
    bottom: 98px;
    right: 28px;
    background: #1a0a0a;
    color: #f5e6d0;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid rgba(139,0,0,0.4);
    z-index: 9998;
    white-space: nowrap;
    opacity: 0;
    transform: translateY(6px);
    transition: all 0.3s ease;
    pointer-events: none;
  }
  #sommelier-btn:hover + #sommelier-label,
  #sommelier-label.visible {
    opacity: 1;
    transform: translateY(0);
  }

  #sommelier-modal {
    display: none;
    position: fixed;
    bottom: 100px;
    right: 28px;
    width: 400px;
    height: 580px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    z-index: 9997;
    border: 1px solid rgba(139,0,0,0.3);
    animation: somm-slideUp 0.3s ease-out;
  }
  #sommelier-modal iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  #sommelier-modal.open { display: block; }

  #sommelier-close {
    position: fixed;
    bottom: 666px;
    right: 32px;
    width: 28px;
    height: 28px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    color: #f5e6d0;
    font-size: 14px;
    cursor: pointer;
    z-index: 9998;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  #sommelier-close.open { display: flex; }

  @keyframes somm-pulse {
    0%   { box-shadow: 0 4px 20px rgba(139,0,0,0.5), 0 0 0 0 rgba(139,0,0,0.4); }
    70%  { box-shadow: 0 4px 20px rgba(139,0,0,0.5), 0 0 0 12px rgba(139,0,0,0); }
    100% { box-shadow: 0 4px 20px rgba(139,0,0,0.5), 0 0 0 0 rgba(139,0,0,0); }
  }
  @keyframes somm-slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    #sommelier-modal {
      width: calc(100vw - 24px);
      height: 70vh;
      right: 12px;
      bottom: 90px;
    }
    #sommelier-close { bottom: calc(70vh + 96px); }
  }
</style>

<button id="sommelier-btn" onclick="toggleSommelier()" title="Falar com Sommelier">🍷</button>
<div id="sommelier-label">Precisa de ajuda para escolher um vinho?</div>
<button id="sommelier-close" onclick="toggleSommelier()">✕</button>

<div id="sommelier-modal">
  <iframe 
    id="sommelier-frame"
    src=""
    title="Sommelier Virtual"
    allow="clipboard-write">
  </iframe>
</div>

<script>
  var sommelierUrl = "SEU-LINK-AQUI"; // ← TROQUE PELO SEU LINK DO VERCEL
  var sommelierOpen = false;

  function toggleSommelier() {
    sommelierOpen = !sommelierOpen;
    var modal = document.getElementById('sommelier-modal');
    var closeBtn = document.getElementById('sommelier-close');
    var frame = document.getElementById('sommelier-frame');

    if (sommelierOpen) {
      if (!frame.src || frame.src === window.location.href) {
        frame.src = sommelierUrl;
      }
      modal.classList.add('open');
      closeBtn.classList.add('open');
    } else {
      modal.classList.remove('open');
      closeBtn.classList.remove('open');
    }
  }

  // Mostrar label depois de 3 segundos
  setTimeout(function() {
    var label = document.getElementById('sommelier-label');
    label.classList.add('visible');
    setTimeout(function() { label.classList.remove('visible'); }, 4000);
  }, 3000);
</script>
